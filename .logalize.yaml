# This is an example configutaion file.
# Values below are not the default setting.
# If you want to get built-in defaults run "logalize --print-config"

# settings:
#   theme: "utopia"

#   no-builtin-formats: false
#   no-builtin-patterns: false
#   no-builtin-words: false
#   no-builtins: true

#   only-formats: false
#   only-patterns: false
#   only-words: false
#
#   no-ansi-escape-sequences-stripping: false

formats:
  test:
    - regexp: ([IWEF][0-9]{4} )
      name: log-level
      alternatives:
        - regexp: (I[0-9]{4} )
          name: info
        - regexp: (W[0-9]{4} )
          name: warning
        - regexp: (E[0-9]{4} )
          name: error
        - regexp: (F[0-9]{4} )
          name: fatal
    - regexp: (--- )
      name: separator
    - regexp: ([0-9]+ )
      name: thread-id
    - regexp: (.*)
      name: message

themes:
  tokyonight-dark:
    formats:
      test:
        log-level:
          info:
            fg: "#82aaff"
            style: bold
          warning:
            fg: "#ffc777"
            style: bold
          error:
            fg: "#ff757f"
            style: bold
          fatal:
            fg: "#c53b53"
            style: bold
        separator:
          fg: "#456789"
        thread-id:
          link-to: log-level
        message:
          style: "patterns-and-words"

